name: API Tests - ServeRest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes de API
        run: npm test

      - name: Upload do relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: reports/html-report.html
          retention-days: 30

      - name: Upload do relatório JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: reports/junit-report.xml
          retention-days: 30

      - name: Publicar resultados JUnit
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: reports/junit-report.xml
          check_name: Resultados dos Testes de API
